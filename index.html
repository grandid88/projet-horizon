<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>I&D Airlines • Projet HORIZON</title>

    <meta name="theme-color" content="#13233F" />

    <!-- ==========================================================
         STYLES
    =========================================================== -->

    <link rel="stylesheet" href="css/variables.css" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/animations.css" />

    <!-- ==========================================================
         GOOGLE FONTS
    =========================================================== -->

    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Poppins:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <!-- ==========================================================
         HORIZON APP
         Point d'entrée unique de l'application
    =========================================================== -->

    <main id="app">
      <!-- ======================================================
             SPLASH SCREEN
        ======================================================= -->

      <section id="splash-screen" class="screen active">
        <div class="logo-container">
          <div class="plane">✈</div>

          <h1>I&amp;D AIRLINES</h1>

          <p>Le voyage commence...</p>
        </div>
      </section>

      <!-- ======================================================
             PASSEPORT
        ======================================================= -->

      <section id="passport-cover" class="screen hidden">
        <div id="passport" class="passport-3d">
          <!-- Ombre -->

          <div class="passport-shadow"></div>

          <!-- Livre -->

          <div class="passport-book">
            <!-- Tranche -->

            <div class="passport-spine"></div>

            <!-- Dos -->

            <div class="passport-back"></div>

            <!-- Couverture -->

            <div class="passport-cover-wrapper">
              <div class="passport-cover">
                <div class="passport-content">
                  <div class="gold-plane">✈</div>

                  <h2>PASSEPORT</h2>

                  <h3>DU VOYAGEUR</h3>

                  <p>Destination</p>

                  <h4>ÎLE MAURICE</h4>

                  <button id="btn-open-passport">Embarquer</button>
                </div>
              </div>
            </div>

            <!-- Pages -->

            <div class="passport-pages">
              <div class="page-left">
                <h3>Bienvenue à bord</h3>

                <p>Votre voyage commence...</p>
              </div>

              <div class="page-right">
                <h3>Passeport</h3>

                <p>Intérieur en construction</p>
              </div>
            </div>

            <!-- Tranche extérieure -->

            <div class="passport-edge"></div>
          </div>
        </div>
      </section>
    </main>

    <!-- ==========================================================
         JAVASCRIPT
    =========================================================== -->

    <script src="js/passport.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
